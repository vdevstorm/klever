<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline' https://www.youtube.com https://s.ytimg.com; frame-src https://www.youtube.com https://www.youtube-nocookie.com; style-src 'unsafe-inline'; img-src data: https://i.ytimg.com https://*.ggpht.com; connect-src https://www.youtube.com https://*.youtube.com https://*.googlevideo.com; media-src https://*.googlevideo.com">
  <title>VeyPlay YouTube Player</title>
  <style>
    html, body, #player { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #000; }
  </style>
</head>
<body>
  <div id="player"></div>
  <script>
    (() => {
      "use strict";

      const scope = "veyplay-youtube-player";
      const query = new URLSearchParams(window.location.search);
      let currentVideoId = query.get("videoId") || "";
      const autoplay = query.get("autoplay") === "1";
      const startSeconds = Math.max(0, Number(query.get("start")) || 0);
      let desiredSpeed = Math.max(0.25, Math.min(2, Number(query.get("speed")) || 1));
      let player;
      let stateTimer;

      function isValidVideoId(value) {
        return /^[A-Za-z0-9_-]{6,20}$/.test(value);
      }

      if (!isValidVideoId(currentVideoId)) return;

      function send(payload) {
        window.parent.postMessage({ scope, ...payload }, "*");
      }

      function publish(error) {
        if (!player || typeof player.getPlayerState !== "function") return;
        send({
          type: "state",
          state: player.getPlayerState(),
          position: player.getCurrentTime ? player.getCurrentTime() : 0,
          duration: player.getDuration ? player.getDuration() : 0,
          videoId: currentVideoId,
          error: error || null
        });
      }

      function applyDesiredSpeed() {
        if (player && typeof player.setPlaybackRate === "function") {
          player.setPlaybackRate(desiredSpeed);
        }
      }

      function loadVideo(value) {
        const nextVideoId = String(value && value.videoId || "");
        if (!player || !isValidVideoId(nextVideoId)) return;

        const nextStart = Math.max(0, Number(value.start) || 0);
        desiredSpeed = Math.max(0.25, Math.min(2, Number(value.speed) || 1));
        currentVideoId = nextVideoId;
        send({
          type: "state",
          state: 3,
          position: nextStart,
          duration: 0,
          videoId: currentVideoId,
          error: null
        });

        const request = { videoId: currentVideoId, startSeconds: nextStart };
        if (value.autoplay) player.loadVideoById(request);
        else player.cueVideoById(request);
        applyDesiredSpeed();
      }

      window.onYouTubeIframeAPIReady = () => {
        player = new YT.Player("player", {
          width: "100%",
          height: "100%",
          videoId: currentVideoId,
          playerVars: {
            playsinline: 1,
            rel: 0,
            controls: 1,
            fs: 1,
            enablejsapi: 1,
            origin: window.location.origin,
            widget_referrer: window.location.href
          },
          events: {
            onReady: event => {
              if (startSeconds > 0) event.target.seekTo(startSeconds, true);
              applyDesiredSpeed();
              if (autoplay) event.target.playVideo();
              const rates = event.target.getAvailablePlaybackRates
                ? event.target.getAvailablePlaybackRates()
                : [];
              send({ type: "capabilities", videoId: currentVideoId, playbackRates: rates, canSeek: true, canMute: true });
              publish();
              stateTimer = window.setInterval(() => publish(), 1000);
            },
            onStateChange: event => {
              if (event.data === 1 || event.data === 5) applyDesiredSpeed();
              publish();
            },
            onError: event => publish(`YouTube không thể phát video này (mã ${event.data}).`)
          }
        });
      };

      window.addEventListener("message", event => {
        const message = event.data;
        if (event.source !== window.parent || !message || message.scope !== scope || !player) return;

        switch (message.command) {
          case "load": loadVideo(message.value); break;
          case "play": player.playVideo(); break;
          case "pause": player.pauseVideo(); break;
          case "stop": player.stopVideo(); break;
          case "seek": player.seekTo(Math.max(0, Number(message.value) || 0), true); break;
          case "speed":
            desiredSpeed = Math.max(0.25, Math.min(2, Number(message.value) || 1));
            applyDesiredSpeed();
            break;
          case "mute": message.value ? player.mute() : player.unMute(); break;
          case "volume": player.setVolume(Math.max(0, Math.min(100, Number(message.value) || 0))); break;
          case "destroy":
            if (stateTimer) window.clearInterval(stateTimer);
            player.destroy();
            player = null;
            break;
        }
      });

      function pauseForBackground() {
        if (!player || typeof player.pauseVideo !== "function") return;
        player.pauseVideo();
        publish();
      }

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) pauseForBackground();
      });
      window.addEventListener("pagehide", pauseForBackground);

      const api = document.createElement("script");
      api.src = "https://www.youtube.com/iframe_api";
      api.async = true;
      document.head.appendChild(api);
    })();
  </script>
</body>
</html>
